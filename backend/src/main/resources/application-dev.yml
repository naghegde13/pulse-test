spring:
  datasource:
    url: jdbc:postgresql:///${DB_NAME:pulse}?cloudSqlInstance=${SPRING_CLOUD_GCP_SQL_INSTANCE_CONNECTION_NAME}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
    username: ${DB_USER:pulse}
    password: ${DB_PASSWORD:pulse}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  cloud:
    gcp:
      sql:
        enabled: true
        jdbc:
          enabled: true
        instance-connection-name: ${SPRING_CLOUD_GCP_SQL_INSTANCE_CONNECTION_NAME}
        database-name: ${DB_NAME:pulse}

pulse:
  cors:
    allowed-origins: ${CORS_ORIGINS:https://pulse-frontend-tdogzj5zrq-uc.a.run.app}
  gcp:
    secret-manager-mode: ${GCP_SECRET_MANAGER_MODE:gcp-secret-manager}
    environment-projects:
      DEV:
        project-id: ${GCP_DEV_PROJECT:pulse-489421}
        region: ${GCP_DEV_REGION:us-central1}
