# Spring profile: suite-a-it
#
# Used by the Suite A backend integration tests
# (PKT-CAND-suite-a-backend-integration-test). Every Suite A test boots its
# own Testcontainers-backed Postgres + fake-gcs-server pair and overrides the
# datasource / GCS endpoint via @DynamicPropertySource inside SuiteABaseIT.
#
# Values declared here are the "defaults" that apply when no @DynamicPropertySource
# override is present (i.e. for things that do not vary per-container). Anything
# Testcontainers manages — datasource URL, username, password, GCS endpoint —
# is intentionally NOT set here so it cannot accidentally leak from a stale
# config.
#
# Goals:
#   - Flyway ON so every checked-in V*.sql migration is exercised.
#   - JPA ddl-auto = validate so entity/schema drift is caught (mirrors the
#     postgres-it profile).
#   - Auth disabled so ActorResolverService returns the dev stub user.
#   - Secret Manager in local-stub mode so credentials never round-trip
#     through real GCP.
#   - GitHub PAT validation skipped (pulse.git.github.enabled=false) so the
#     test never makes an outbound call to api.github.com; Suite A scenarios
#     seed a VALID UserGitIdentity row directly.

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
    repair-on-migrate: true

  data:
    redis:
      # Suite A scenarios do not exercise Redis — point at a port that should
      # be closed so any accidental Redis dependency surfaces loudly rather
      # than silently passing through a leaked CI Redis.
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6390}

  cloud:
    gcp:
      sql:
        enabled: false
        jdbc:
          enabled: false

pulse:
  auth:
    enabled: false
  gcp:
    # Suite A tests must not touch real Secret Manager. The local-stub mode
    # writes secrets to {pulse.git.clone-base}/.secrets/{env}/{secretId}.enc.
    secret-manager-mode: local-stub
    local-stub-key: pulse-suite-a-it-stub-key-not-for-prod
  git:
    # The exact directory is overridden per-test by SuiteABaseIT via
    # @DynamicPropertySource so each test gets its own temp clone-base. This
    # default is only here so the property is resolvable at context startup.
    clone-base: /tmp/pulse/suite-a-it/repos
    local-repo-base: /tmp/pulse/suite-a-it/repos
    default-environment: dev
    github:
      # Disable real api.github.com calls — Suite A seeds a VALID identity
      # directly and mocks RemoteGitService.verifyRepoAccess / cloneRepo.
      enabled: false
  tenants:
    # Suite A scenarios create their own tenants via the harness so this list
    # is intentionally empty; rely on TenantService.getTenant resolving from
    # the live `tenants` table once the harness inserts a row.
    definitions: []

logging:
  level:
    com.pulse.git: DEBUG
    com.pulse.suitea: DEBUG
    org.testcontainers: INFO
