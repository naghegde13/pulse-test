apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-backend
  annotations:
    image.openshift.io/triggers: |
      [{"from":{"kind":"ImageStreamTag","name":"pulse-backend:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"backend\")].image"}]
  labels:
    app: pulse-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulse-backend
  template:
    metadata:
      labels:
        app: pulse-backend
    spec:
      containers:
        - name: backend
          image: image-registry.openshift-image-registry.svc:5000/your-project/pulse-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: pulse-backend-config
                  key: SERVER_PORT
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: pulse-backend-secret
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: pulse-backend-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: pulse-backend-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: pulse-backend-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pulse-backend-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pulse-backend-secret
                  key: JWT_SECRET
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: pulse-backend-config
                  key: CORS_ORIGINS
            - name: MANAGEMENT_HEALTH_REDIS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: pulse-backend-config
                  key: MANAGEMENT_HEALTH_REDIS_ENABLED
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: pulse-backend-config
                  key: REDIS_PORT
            - name: PULSE_LLM_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: pulse-backend-config
                  key: PULSE_LLM_PROVIDER
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pulse-backend-secret
                  key: LLM_API_KEY
                  optional: true
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pulse-backend-secret
                  key: OPENROUTER_API_KEY
                  optional: true
            - name: VERTEX_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: pulse-backend-secret
                  key: VERTEX_PROJECT_ID
                  optional: true
            - name: VERTEX_LOCATION
              valueFrom:
                secretKeyRef:
                  name: pulse-backend-secret
                  key: VERTEX_LOCATION
                  optional: true
            - name: VERTEX_CREDENTIALS_PATH
              valueFrom:
                secretKeyRef:
                  name: pulse-backend-secret
                  key: VERTEX_CREDENTIALS_PATH
                  optional: true
            - name: GOOGLE_APPLICATION_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: pulse-backend-secret
                  key: GOOGLE_APPLICATION_CREDENTIALS
                  optional: true
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
