apiVersion: v1
kind: ConfigMap
metadata:
  name: pulse-backend-config
  labels:
    app: pulse-backend
data:
  SERVER_PORT: "8080"
  DB_PORT: "5432"
  REDIS_PORT: "6379"
  CORS_ORIGINS: "https://pulse-frontend.apps.cluster.example.com"
  # Keep green health while Redis is not yet provisioned on OCP.
  MANAGEMENT_HEALTH_REDIS_ENABLED: "false"
  # Optional LLM provider selector.
  PULSE_LLM_PROVIDER: "vertex"
