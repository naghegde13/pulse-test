apiVersion: v1
kind: Secret
metadata:
  name: pulse-backend-secret
  labels:
    app: pulse-backend
type: Opaque
stringData:
  DB_HOST: "postgres.example.svc.cluster.local"
  DB_NAME: "pulse"
  DB_USER: "pulse"
  DB_PASSWORD: "replace-me"
  JWT_SECRET: "replace-me-with-strong-random-secret"

  # Optional: only if using OpenRouter path
  LLM_API_KEY: ""
  OPENROUTER_API_KEY: ""

  # Optional: only if using Vertex path
  VERTEX_PROJECT_ID: ""
  VERTEX_LOCATION: "global"
  VERTEX_CREDENTIALS_PATH: ""
  GOOGLE_APPLICATION_CREDENTIALS: ""
