# Suite A — backend regression-prevention integration tests
#
# Lane: ./gradlew suiteA (see backend/build.gradle.kts and
# docs/testing/suite-a-backend-integration.md).
#
# This workflow is a PATH-BASED required gate. It only runs when a PR
# changes files in the surfaces Suite A guards (git, storage, auth, chat),
# or in Suite A's own harness / dependencies. The merge gate is enforced by
# the GitHub branch protection settings — when this workflow runs and
# fails, the PR is blocked from merging.
#
# Why path-based rather than every-PR:
#   - Suite A boots a full Spring context against two Testcontainers
#     (Postgres 16-alpine + fsouza/fake-gcs-server). Cold-cache run is
#     ~5 minutes; warm-cache ~3 minutes. Running it on every PR (frontend
#     style tweaks, doc edits, etc.) would add minutes of CI latency for
#     no signal.
#   - The packets Suite A guards are tenant-onboarding / chat / secret
#     subsystems. Code outside those packages cannot regress the bugs
#     Suite A catches.
#
# Linux is canonical; macOS is best-effort for local dev. See
# docs/testing/suite-a-backend-integration.md > "Local dev — macOS caveats".

name: Suite A

on:
  pull_request:
    branches: [main]
    paths:
      # Production surfaces Suite A scenarios exercise. Onboarding, chat,
      # storage scaffold, secret resolution, and auth wiring are the four
      # packages where a regression would slip past the fast PR lane and
      # land in the next guided rehearsal.
      - 'backend/src/main/java/com/pulse/git/**'
      - 'backend/src/main/java/com/pulse/storage/**'
      - 'backend/src/main/java/com/pulse/auth/**'
      - 'backend/src/main/java/com/pulse/chat/**'
      # Suite A's own harness + scenarios. Any change to the harness must
      # re-run the full suite even if no production code changed.
      - 'backend/src/test/java/com/pulse/suitea/**'
      - 'backend/src/test/resources/application-suite-a-it.yml'
      # Build wiring — gradle config, dependency additions, etc.
      - 'backend/build.gradle.kts'
      - 'backend/settings.gradle.kts'
      # The workflow file itself.
      - '.github/workflows/suite-a.yml'
  # Manual trigger for diagnostic / ad-hoc runs (e.g. after merging a
  # platform_release manifest pin in tenant repos).
  workflow_dispatch: {}

# Concurrency: cancel in-flight runs on the same PR when a new commit
# lands. We only need to gate on the latest commit.
concurrency:
  group: suite-a-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  suite-a:
    name: Suite A (Postgres + fake-gcs-server)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make gradle wrapper executable
        run: chmod +x gradlew

      # Pre-pull Testcontainers images so the cold-pull cost is paid in
      # a step that's easy to attribute in the workflow log. Both images
      # are small (~70MB Postgres, ~50MB fake-gcs-server) so the pull
      # adds <30s.
      - name: Pre-pull Testcontainers images
        run: |
          docker pull postgres:16-alpine
          docker pull fsouza/fake-gcs-server:latest
          # Ryuk is pulled lazily by Testcontainers itself.

      - name: Run Suite A regression suite
        run: ./gradlew suiteA --no-daemon

      - name: Upload Suite A test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: suite-a-reports
          path: |
            backend/build/reports/tests/suiteA/
            backend/build/test-results/suiteA/
          # Keep for 30 days — long enough to diagnose flakes across a
          # typical rehearsal cycle without bloating storage.
          retention-days: 30
