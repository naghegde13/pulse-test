# Hadoop S3A config for the local docker-compose Spark cluster.
#
# This file is bind-mounted into spark-master and spark-worker containers at
# /opt/bitnami/spark/conf/spark-defaults.conf. The cluster uses these settings
# when resolving s3a:// URIs at runtime.
#
# PULSE-generated code emits standard s3a:// paths against the bucket names
# from storage_backends.storage_root_files / storage_root_lake. The cluster
# decides where those s3a paths actually go via the endpoint config below —
# locally that's MinIO; in real deployed environments the same Spark cluster
# definition would have a different endpoint (real Cloudera object storage,
# real Cloud Storage, etc.). PULSE itself has zero knowledge of MinIO.

# S3A endpoint pointing at the local MinIO instance
spark.hadoop.fs.s3a.endpoint                  http://minio:9000

# Path-style access (vs virtual-hosted-style) — required for MinIO
spark.hadoop.fs.s3a.path.style.access         true

# Static credentials for the local MinIO instance
spark.hadoop.fs.s3a.access.key                minioadmin
spark.hadoop.fs.s3a.secret.key                minioadmin

# MinIO is plain HTTP locally — no TLS to validate
spark.hadoop.fs.s3a.connection.ssl.enabled    false

# Use the standard S3A filesystem implementation
spark.hadoop.fs.s3a.impl                      org.apache.hadoop.fs.s3a.S3AFileSystem

# Use simple credentials provider (vs IAM/instance-profile chains)
spark.hadoop.fs.s3a.aws.credentials.provider  org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# Airflow's local PySpark client also reads this file. The Bitnami Spark
# containers already include the Hadoop client; the Airflow driver resolves
# S3A + Delta packages via Spark's package loader so MinIO-backed Delta writes
# work from client mode too.
spark.jars.packages                           org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262,io.delta:delta-spark_2.12:3.3.2,org.postgresql:postgresql:42.7.5

# Enable Delta Lake writes for generated jobs and dbt materializations.
spark.sql.extensions                          io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog               org.apache.spark.sql.delta.catalog.DeltaCatalog
